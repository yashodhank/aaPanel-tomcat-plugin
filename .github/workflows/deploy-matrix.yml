name: Deploy matrix (WAR/JAR/migrate + DB)

# OPT-IN ONLY. This workflow builds the sample artifacts and drives the deploy
# matrix (WAR / JAR / migrate, plus a DB round-trip) against real runtimes. It is
# slow and network-dependent, so it must NOT run on every push. Triggers:
#   - workflow_dispatch: manual, on demand.
#   - schedule: once a week, to catch upstream (Apache/Adoptium/driver) drift.
on:
  workflow_dispatch:
  schedule:
    # 06:31 UTC every Monday — off the top of the hour to dodge cron congestion.
    - cron: "31 6 * * 1"

# Cancel an in-flight run if a newer one starts on the same ref.
concurrency:
  group: deploy-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- service-less matrix: WAR / JAR / migrate, no database --------------------
  deploy-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Point the plugin core imports at the in-repo source tree.
      JAVAHOST_PLUGIN_DIR: ${{ github.workspace }}/plugin/javahost
      # Run the engine as the current (runner) user; "root" makes the harness
      # take the no-su DIRECT path and never try to `su www` (no such user).
      JAVAHOST_E2E_USER: root
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Provision plugin state dir
        run: |
          set -euo pipefail
          sudo mkdir -p /www/server/javahost
          sudo chown -R "$(id -u):$(id -g)" /www/server/javahost

      - name: Build sample artifacts
        run: python3 tests/fixtures/make_samples.py --all

      - name: Run deploy matrix (service-less, no DB)
        run: python3 tests/e2e/deploy_matrix.py

      - name: Upload instance logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-matrix-logs
          path: /www/server/javahost/**/logs/**
          if-no-files-found: ignore
          retention-days: 14

  # --- DB matrix: same harness with --with-db against service containers --------
  deploy-matrix-db:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      JAVAHOST_PLUGIN_DIR: ${{ github.workspace }}/plugin/javahost
      JAVAHOST_E2E_USER: root
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: javahost
          POSTGRES_PASSWORD: javahost
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U javahost -d appdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: javahost
          MYSQL_DATABASE: appdb
          MYSQL_USER: javahost
          MYSQL_PASSWORD: javahost
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root --password=javahost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: javahost
          MARIADB_DATABASE: appdb
          MARIADB_USER: javahost
          MARIADB_PASSWORD: javahost
        ports:
          - 3307:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mongo:
        image: mongo:8
        env:
          MONGO_INITDB_ROOT_USERNAME: javahost
          MONGO_INITDB_ROOT_PASSWORD: javahost
          MONGO_INITDB_DATABASE: appdb
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' | grep -q 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Provision plugin state dir
        run: |
          set -euo pipefail
          sudo mkdir -p /www/server/javahost
          sudo chown -R "$(id -u):$(id -g)" /www/server/javahost

      - name: Build sample artifacts
        run: python3 tests/fixtures/make_samples.py --all

      - name: Run deploy matrix (--with-db against service containers)
        # Service containers are reachable on 127.0.0.1 at their mapped ports:
        #   postgres 5432, mysql 3306, mariadb 3307, mongo 27017.
        run: python3 tests/e2e/deploy_matrix.py --with-db

      - name: Upload instance logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-matrix-db-logs
          path: /www/server/javahost/**/logs/**
          if-no-files-found: ignore
          retention-days: 14
