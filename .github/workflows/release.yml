name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Test before release
        run: |
          pip install pytest -q
          find plugin/javahost -name '*.py' -print0 | xargs -0 python3 -m py_compile
          python3 -m pytest -q tests/

      - name: Sync info.json version
        run: |
          python3 - <<'PY'
          import json, datetime, os
          p = "plugin/javahost/info.json"
          info = json.load(open(p))
          info["versions"] = "${{ steps.version.outputs.version }}"
          info["date"] = datetime.date.today().isoformat()
          json.dump(info, open(p, "w"), indent='\t', ensure_ascii=False)
          PY

      - name: Build ZIP + checksum
        run: |
          V=${{ steps.version.outputs.version }}
          ( cd plugin && zip -r "../javahost-v${V}.zip" javahost -x '*/__pycache__/*' '*.pyc' )
          sha256sum "javahost-v${V}.zip" > "javahost-v${V}.zip.sha256"
          ls -lh javahost-v${V}.zip*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: JavaHost v${{ steps.version.outputs.version }}
          files: |
            javahost-v${{ steps.version.outputs.version }}.zip
            javahost-v${{ steps.version.outputs.version }}.zip.sha256
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
